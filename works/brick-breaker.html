<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        #gameCanvas {
            background: #1a1a2e;
            border: 3px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .info {
            color: white;
            text-align: center;
            margin: 20px 0;
            font-size: 20px;
            font-weight: bold;
        }

        .controls {
            color: white;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .game-over, .game-win {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            display: none;
        }

        .menu-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px solid white;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }

        .menu-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

        #speedIndicator {
            color: #FFD700;
            font-size: 16px;
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div class="info">
        <span>分数: <span id="score">0</span></span> |
        <span>生命: <span id="lives">3</span></span>
        <span id="speedIndicator">速度: 1.0x</span>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="controls">使用 ← → 方向键或 A D 键移动挡板 | 按空格键开始/暂停 | ESC 返回菜单</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        let gameState = 'menu'; // menu, playing, paused, gameover, win
        let score = 0;
        let lives = 3;
        let bricksDestroyed = 0;

        // 挡板
        const paddle = {
            width: 100,
            height: 15,
            x: canvas.width / 2 - 50,
            y: canvas.height - 30,
            speed: 8,
            dx: 0
        };

        // 球
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 8,
            baseSpeed: 3,
            speed: 3,
            dx: 3,
            dy: -3
        };

        // 砖块设置
        const brick = {
            rows: 5,
            cols: 9,
            width: 75,
            height: 20,
            padding: 10,
            offsetX: 35,
            offsetY: 60
        };

        // 创建砖块数组
        let bricks = [];
        let highScores = JSON.parse(localStorage.getItem('brickBreakerScores')) || [];

        function createBricks() {
            bricks = [];
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8'];
            for (let row = 0; row < brick.rows; row++) {
                bricks[row] = [];
                for (let col = 0; col < brick.cols; col++) {
                    bricks[row][col] = {
                        x: brick.offsetX + col * (brick.width + brick.padding),
                        y: brick.offsetY + row * (brick.height + brick.padding),
                        status: 1,
                        color: colors[row % colors.length]
                    };
                }
            }
        }

        // 绘制挡板
        function drawPaddle() {
            ctx.fillStyle = '#fff';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            ctx.strokeRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        // 绘制球
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();
        }

        // 绘制砖块
        function drawBricks() {
            bricks.forEach(row => {
                row.forEach(b => {
                    if (b.status === 1) {
                        ctx.fillStyle = b.color;
                        ctx.fillRect(b.x, b.y, brick.width, brick.height);
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(b.x, b.y, brick.width, brick.height);
                    }
                });
            });
        }

        // 移动挡板
        function movePaddle() {
            paddle.x += paddle.dx;

            if (paddle.x < 0) {
                paddle.x = 0;
            }

            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }
        }

        // 移动球
        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // 墙壁碰撞检测
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx *= -1;
            }

            if (ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }

            // 挡板碰撞检测
            if (ball.y + ball.radius > paddle.y &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {
                ball.dy *= -1;

                // 根据击球位置改变球的水平速度
                let hitPos = (ball.x - paddle.x) / paddle.width;
                ball.dx = (hitPos - 0.5) * 10;
            }

        // 球掉落
            if (ball.y + ball.radius > canvas.height) {
                lives--;
                document.getElementById('lives').textContent = lives;

                if (lives === 0) {
                    gameState = 'gameover';
                    saveScore();
                    showGameOver();
                } else {
                    resetBall();
                }
            }
        }

        // 砖块碰撞检测
        function brickCollision() {
            bricks.forEach(row => {
                row.forEach(b => {
                    if (b.status === 1) {
                        if (ball.x > b.x &&
                            ball.x < b.x + brick.width &&
                            ball.y > b.y &&
                            ball.y < b.y + brick.height) {
                            ball.dy *= -1;
                            b.status = 0;
                            score += 10;
                            bricksDestroyed++;
                            document.getElementById('score').textContent = score;

                            // 每击碎5个砖块，球速增加
                            if (bricksDestroyed % 5 === 0) {
                                ball.speed = ball.baseSpeed + (bricksDestroyed / 5) * 0.5;
                                updateBallSpeed();
                            }

                            // 检查是否获胜
                            if (score === brick.rows * brick.cols * 10) {
                                gameState = 'win';
                                saveScore();
                                showGameWin();
                            }
                        }
                    }
                });
            });
        }

        // 更新球速
        function updateBallSpeed() {
            const angle = Math.atan2(ball.dy, ball.dx);
            ball.dx = Math.cos(angle) * ball.speed;
            ball.dy = Math.sin(angle) * ball.speed;
        }

        // 重置球
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = ball.baseSpeed + (bricksDestroyed / 5) * 0.5;
            ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -ball.speed;
            gameState = 'paused';
        }

        // 显示游戏结束
        function showGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2 - 60);
            ctx.font = '24px Arial';
            ctx.fillText('最终分数: ' + score, canvas.width / 2, canvas.height / 2 - 10);
            ctx.font = '18px Arial';
            ctx.fillText('按 R 键重新开始 | 按 ESC 返回菜单', canvas.width / 2, canvas.height / 2 + 40);
        }

        // 显示胜利
        function showGameWin() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#FFD700';
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('恭喜过关!', canvas.width / 2, canvas.height / 2 - 60);
            ctx.font = '24px Arial';
            ctx.fillText('最终分数: ' + score, canvas.width / 2, canvas.height / 2 - 10);
            ctx.font = '18px Arial';
            ctx.fillText('按 R 键重新开始 | 按 ESC 返回菜单', canvas.width / 2, canvas.height / 2 + 40);
        }

        // 显示菜单
        function showMenu() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('打砖块游戏', canvas.width / 2, 100);

            ctx.fillStyle = '#fff';
            ctx.font = '24px Arial';
            ctx.fillText('按 SPACE 开始游戏', canvas.width / 2, 200);
            ctx.fillText('按 L 查看排行榜', canvas.width / 2, 240);

            ctx.font = '18px Arial';
            ctx.fillStyle = '#aaa';
            ctx.fillText('游戏说明:', canvas.width / 2, 320);
            ctx.font = '16px Arial';
            ctx.fillText('• 使用方向键或 A/D 键控制挡板', canvas.width / 2, 350);
            ctx.fillText('• 击碎所有砖块即可获胜', canvas.width / 2, 380);
            ctx.fillText('• 每击碎5个砖块，球速会增加', canvas.width / 2, 410);
            ctx.fillText('• 失去所有生命则游戏结束', canvas.width / 2, 440);
        }

        // 显示排行榜
        function showLeaderboard() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('排行榜', canvas.width / 2, 80);

            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';

            if (highScores.length === 0) {
                ctx.fillText('暂无记录', canvas.width / 2, 200);
            } else {
                const topScores = highScores.slice(0, 10);
                topScores.forEach((scoreData, index) => {
                    const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}.`;
                    ctx.fillText(`${medal} ${scoreData.score} 分 - ${scoreData.date}`, canvas.width / 2, 150 + index * 35);
                });
            }

            ctx.font = '18px Arial';
            ctx.fillStyle = '#aaa';
            ctx.fillText('按 ESC 返回菜单', canvas.width / 2, 550);
        }

        // 保存分数
        function saveScore() {
            const date = new Date().toLocaleDateString('zh-CN');
            highScores.push({ score, date });
            highScores.sort((a, b) => b.score - a.score);
            highScores = highScores.slice(0, 50);
            localStorage.setItem('brickBreakerScores', JSON.stringify(highScores));
        }

        // 更新速度显示
        function updateSpeedDisplay() {
            const speedMultiplier = (ball.speed / ball.baseSpeed).toFixed(1);
            document.getElementById('speedIndicator').textContent = `速度: ${speedMultiplier}x`;
        }

        // 绘制游戏
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'menu') {
                showMenu();
            } else if (gameState === 'leaderboard') {
                showLeaderboard();
            } else if (gameState === 'playing' || gameState === 'paused') {
                drawBricks();
                drawBall();
                drawPaddle();

                if (gameState === 'paused') {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#fff';
                    ctx.font = '36px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('暂停', canvas.width / 2, canvas.height / 2);
                    ctx.font = '18px Arial';
                    ctx.fillText('按空格键继续', canvas.width / 2, canvas.height / 2 + 40);
                }
            } else if (gameState === 'gameover') {
                drawBricks();
                drawBall();
                drawPaddle();
                showGameOver();
            } else if (gameState === 'win') {
                drawBricks();
                drawBall();
                drawPaddle();
                showGameWin();
            }
        }

        // 更新游戏
        function update() {
            if (gameState === 'playing') {
                movePaddle();
                moveBall();
                brickCollision();
                updateSpeedDisplay();
            }

            draw();
            requestAnimationFrame(update);
        }

        // 键盘控制
        function keyDown(e) {
            if (gameState === 'playing') {
                if (e.key === 'Right' || e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    paddle.dx = paddle.speed;
                } else if (e.key === 'Left' || e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    paddle.dx = -paddle.speed;
                }
            }

            if (e.key === ' ') {
                e.preventDefault();
                if (gameState === 'menu') {
                    startGame();
                } else if (gameState === 'playing') {
                    gameState = 'paused';
                } else if (gameState === 'paused') {
                    gameState = 'playing';
                }
            } else if (e.key === 'Escape') {
                if (gameState !== 'menu') {
                    returnToMenu();
                }
            } else if (e.key === 'r' || e.key === 'R') {
                if (gameState === 'gameover' || gameState === 'win') {
                    startGame();
                }
            } else if (e.key === 'l' || e.key === 'L') {
                if (gameState === 'menu') {
                    gameState = 'leaderboard';
                }
            }
        }

        function keyUp(e) {
            if (e.key === 'Right' || e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D' ||
                e.key === 'Left' || e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                paddle.dx = 0;
            }
        }

        // 重置游戏
        function resetGame() {
            score = 0;
            lives = 3;
            bricksDestroyed = 0;
            gameState = 'menu';
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            createBricks();
            ball.speed = ball.baseSpeed;
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = ball.baseSpeed;
            ball.dy = -ball.baseSpeed;
            paddle.x = canvas.width / 2 - paddle.width / 2;
            updateSpeedDisplay();
        }

        // 开始游戏
        function startGame() {
            score = 0;
            lives = 3;
            bricksDestroyed = 0;
            gameState = 'playing';
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            createBricks();
            ball.speed = ball.baseSpeed;
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = ball.baseSpeed * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -ball.baseSpeed;
            paddle.x = canvas.width / 2 - paddle.width / 2;
            updateSpeedDisplay();
        }

        // 返回菜单
        function returnToMenu() {
            resetGame();
        }

        // 事件监听
        document.addEventListener('keydown', keyDown);
        document.addEventListener('keyup', keyUp);

        // 初始化游戏
        resetGame();
        update();
    </script>
</body>
</html>
